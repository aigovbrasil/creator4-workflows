<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creator Operating Suite — 15s Ad v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; height: 100%; overflow: hidden; }
  #root { position: absolute; inset: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" data-screen-label="t=0.0s"></div>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="ad-scenes-v2.jsx"></script>

  <script type="text/babel">
    // 15-second vertical ad — Creator Operating Suite + PersonalizationOS
    const SCENES_V2 = {
      hook:     [ 0,  3],   // 01 Still re-explaining your work to Claude?
      shift:    [ 3,  6],   // 02 Build a personal AI work system
      pipeline: [ 6, 10],   // 03 Entry Skill → PersonalizationOS → Output
      github:   [10, 13],   // 04 Public starter on GitHub
      cta:      [13, 15],   // 05 Try the public starter
    };
    const TOTAL_V2 = 15;

    function AdV2() {
      return (
        <Stage
          width={1080}
          height={1920}
          duration={TOTAL_V2}
          background="#F4F1EA"
          loop={true}
          autoplay={true}
          persistKey="creator-ad-v2"
        >
          <AdV2TimeLabel />
          <SceneV2Hook     start={SCENES_V2.hook[0]}     end={SCENES_V2.hook[1]} />
          <SceneV2Shift    start={SCENES_V2.shift[0]}    end={SCENES_V2.shift[1]} />
          <SceneV2Pipeline start={SCENES_V2.pipeline[0]} end={SCENES_V2.pipeline[1]} />
          <SceneV2GitHub   start={SCENES_V2.github[0]}   end={SCENES_V2.github[1]} />
          <SceneV2CTA      start={SCENES_V2.cta[0]}      end={SCENES_V2.cta[1]} />
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdV2 />);
  </script>
</body>
</html>
