<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creator Operating Suite — 15s Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; height: 100%; overflow: hidden; }
  #root { position: absolute; inset: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" data-screen-label="t=0.0s"></div>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="ad-scenes.jsx"></script>

  <script type="text/babel">
    // 15-second vertical ad, 4 scenes
    const SCENES = {
      hook:     [ 0,  3],
      solution: [ 3,  8],
      result:   [ 8, 12],
      cta:      [12, 15],
    };
    const TOTAL = 15;

    function Ad() {
      return (
        <Stage
          width={1080}
          height={1920}
          duration={TOTAL}
          background="#F4F1EA"
          loop={true}
          autoplay={true}
          persistKey="creator-ad-vertical"
        >
          <AdTimeLabel />
          <SceneHook     start={SCENES.hook[0]}     end={SCENES.hook[1]} />
          <SceneSolution start={SCENES.solution[0]} end={SCENES.solution[1]} />
          <SceneResult   start={SCENES.result[0]}   end={SCENES.result[1]} />
          <SceneCTAAd    start={SCENES.cta[0]}      end={SCENES.cta[1]} />
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Ad />);
  </script>
</body>
</html>
